<!DOCTYPE html>
<html>
<head>
  <title>lesson 9</title>
  <link rel="stylesheet" href="lesson9.css">
</head>
<body>

  <div class="red-square"></div>
  <div class="green-circle"></div>

  <div class="survey-box">
    <p>Satisfied with our service?</p>
    <button>Yes</button> <button>No</button>
  </div>

  <div class="yt-music-box">
    <div class="yt-title">Install YouTube Music</div>
    <div class="yt-sub">Add YouTube Music to your desktop for quick and easy access</div>
  </div>

  <div class="twitter-card">
    <img class="profile-pic" src="https://i.pinimg.com/736x/59/64/bb/5964bb53446a7be28280fe7c88ffce9f.jpg">
    <input class="tweet-input" type="text" placeholder="What's happening?">
    <button class="tweet-btn">Tweet</button>
  </div>

  <div class="friend-card">
    <img class="friend-img" src="https://i.pinimg.com/736x/59/64/bb/5964bb53446a7be28280fe7c88ffce9f.jpg">
    <div class="friend-info">
      <div class="friend-name">Oliver</div>
      <div class="mutual-friends">2 mutual friends</div>
      <button class="add-btn">Add Friend</button>
    </div>
  </div>

  <div class="friend-card">
    <img class="friend-img" src="https://i.pinimg.com/736x/fe/65/f1/fe65f118eacadaefba41d4ccecf45657.jpg">
    <div class="friend-info">
      <div class="friend-name">Mimi</div>
      <div class="mutual-friends">5 mutual friends</div>
      <button class="add-btn">Add Friend</button>
    </div>
  </div>

  <div class="friend-card">
    <img class="friend-img" src="https://i.pinimg.com/1200x/13/6c/e9/136ce984db3e4cdbcd6e2a20f2fe92b2.jpg">
    <div class="friend-info">
      <div class="friend-name">Rex</div>
      <div class="mutual-friends">4 mutual friends</div>
      <button class="add-btn">Add Friend</button>
    </div>
  </div>

  <hr>

  <div class="google-center">
    <div><img class="google-logo" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"></div>
    <div class="google-search-container">
      <input class="google-input" type="text" placeholder="Search Google or type a URL">
    </div>
    <div class="google-buttons">
      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>
    </div>
  </div>

</body>
</html>
