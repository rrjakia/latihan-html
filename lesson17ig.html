<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Instagram Desktop UI</title>
  <link rel="stylesheet" href="lesson17ig.css">
</head>
<body>

  <nav class="sidebar">
    <img class="logo-ig" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png">
    
    <div class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png">
      <span><b>Beranda</b></span>
    </div>

    <div class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png">
      <span>Cari</span>
    </div>

    <div class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/542/542689.png">
      <span>Pesan</span>
    </div>

    <div class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png">
      <span>Profil</span>
    </div>
  </nav>

  <main class="main-content">
    
    <div class="stories-row">
      <div class="story">
        <div class="story-circle">
          <img src="https://i.pinimg.com/1200x/13/6c/e9/136ce984db3e4cdbcd6e2a20f2fe92b2.jpg">
        </div>
        <span>wseokwoo</span>
      </div>

      <div class="story">
        <div class="story-circle">
          <img src="https://i.pinimg.com/736x/fe/65/f1/fe65f118eacadaefba41d4ccecf45657.jpg">
        </div>
        <span>for_everyong10</span>
      </div>
    </div>

    <article class="post-card">
      <div class="post-header">
        <img class="user-avatar" src="https://i.pinimg.com/736x/59/64/bb/5964bb53446a7be28280fe7c88ffce9f.jpg">
        <span style="font-weight:600; font-size:14px;">oliver__</span>
      </div>

      <img class="post-img" src="https://i.pinimg.com/736x/63/8b/d9/638bd9516473ea9b539d9a0c4c393b07.jpg">

      <div class="post-actions">
        <img class="action-icon" src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png">
        <img class="action-icon" src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png">
        <img class="action-icon" src="https://cdn-icons-png.flaticon.com/512/2099/2099085.png">
      </div>

      <div class="likes">1.639 suka</div>
      
      <div class="caption">
        <b>oliver__</b> i only see deadline, deadline, deadline...
      </div>
    </article>

  </main>

  <aside class="suggestions-panel">
    <div class="suggest-row">
      <div style="display:flex; align-items:center;">
        <img class="user-avatar" src="https://i.pinimg.com/1200x/a6/61/db/a661db4cc7709ad963cb453c8dec530c.jpg">
        <div>
          <p style="font-weight:600; font-size:14px;">moOOouMo</p>
          <p style="color:#8e8e8e; font-size:12px;">lula</p>
        </div>
      </div>
      <span class="blue-text">Beralih</span>
    </div>
  </aside>

</body>
</html>
