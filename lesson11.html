<!DOCTYPE html>
<html>
<head>
  <title>Lesson 11 - CSS Grid Exercises</title>
  <link rel="stylesheet" href="lesson11.css">
</head>
<body>

  <h2>11a. Grid 2 Columns</h2>
  <div class="grid-11a">
    <div class="box-blue">200px</div>
    <div class="box-pink">75px</div>
  </div>

  <h2>11b. Grid 3 Columns (Fluid Middle)</h2>
  <div class="grid-11b">
    <div class="box-blue">50px</div>
    <div class="box-pink">1fr</div>
    <div class="box-blue">75px</div>
  </div>

  <h2>11c. Grid 4 Columns (Gap)</h2>
  <div class="grid-11c">
    <div class="box-pink">col1</div><div class="box-pink">col2</div><div class="box-pink">col3</div><div class="box-pink">col4</div>
    <div class="box-pink">col1</div><div class="box-pink">col2</div><div class="box-pink">col3</div><div class="box-pink">col4</div>
  </div>

  <hr>

  <h2>11d. Friend Cards Grid</h2>
  <div class="card-grid">
    
    <div class="friend-card">
      <img class="friend-img" src="https://i.pinimg.com/736x/59/64/bb/5964bb53446a7be28280fe7c88ffce9f.jpg">
      <div class="friend-info">
        <p class="friend-name">Oliver</p>
        <div class="mutual-row">
          <img class="tiny-avatar" src="https://i.pinimg.com/736x/a3/a7/54/a3a75442de07e418a5be1077bb7fc9ce.jpg">
          <span class="mutual-text">2 mutual friends</span>
        </div>
        <button class="add-btn">Add Friend</button>
      </div>
    </div>

    <div class="friend-card">
      <img class="friend-img" src="https://i.pinimg.com/736x/fe/65/f1/fe65f118eacadaefba41d4ccecf45657.jpg">
      <div class="friend-info">
        <p class="friend-name">Mimi</p>
        <div class="mutual-row">
          <img class="tiny-avatar" src="https://i.pinimg.com/736x/a3/a7/54/a3a75442de07e418a5be1077bb7fc9ce.jpg">
          <span class="mutual-text">3 mutual friends</span>
        </div>
        <button class="add-btn">Add Friend</button>
      </div>
    </div>

    <div class="friend-card">
      <img class="friend-img" src="https://i.pinimg.com/1200x/13/6c/e9/136ce984db3e4cdbcd6e2a20f2fe92b2.jpg">
      <div class="friend-info">
        <p class="friend-name">Rex</p>
        <div class="mutual-row">
          <img class="tiny-avatar" src="https://i.pinimg.com/736x/a3/a7/54/a3a75442de07e418a5be1077bb7fc9ce.jpg">
          <span class="mutual-text">4 mutual friends</span>
        </div>
        <button class="add-btn">Add Friend</button>
      </div>
    </div>

  </div>

</body>
</html>
