<!DOCTYPE html>
<html>
<head>
  <title>lesson 17 twitter</title>
  <link rel="stylesheet" href="lesson17tw.css">
</head>
<body>

  <div class="container">
    <nav class="sidebar">
      <img class="twitter-logo" src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
      
      <div class="nav-link active-link">
        <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png"><span>Home</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png"><span>Explore</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/3119/3119338.png"><span>Notifications</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/542/542689.png"><span>Messages</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/102/102279.png"><span>Bookmarks</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/151/151917.png"><span>Lists</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png"><span>Profile</span>
      </div>
      <div class="nav-link">
        <img src="https://cdn-icons-png.flaticon.com/512/57/57108.png"><span>More</span>
      </div>

      <button class="tweet-button-large">Tweet</button>
    </nav>

    <main class="main-feed">
      <div class="header">Home</div>
      
      <div class="tweet-card">
        <img class="profile-pic" src="https://i.pinimg.com/736x/fe/65/f1/fe65f118eacadaefba41d4ccecf45657.jpg">
        <div class="tweet-content">
          <div class="tweet-user">mimi <span class="tweet-handle">@foreveryoung10 · 2h</span></div>
          <img class="meme-photo-deadline" src="https://i.pinimg.com/736x/63/8b/d9/638bd9516473ea9b539d9a0c4c393b07.jpg">
        </div>
      </div>
    </main>

    <aside class="right-sidebar">
      <input type="text" class="search-input" placeholder="Search Twitter">
      <div class="trends-container">
        <h2 style="font-size: 20px; margin-bottom: 15px; color: black;">Trends for you</h2>
        
        <div class="trend-item">
          <div class="trend-category">Trending in Technology</div>
          <div class="trend-title">#AI</div>
          <div class="trend-count">12.5K Tweets</div>
        </div>

        <div class="trend-item">
          <div class="trend-category">Trending in Indonesia</div>
          <div class="trend-title">#fhui</div>
          <div class="trend-count">45.1K Tweets</div>
        </div>
      </div>
    </aside>
  </div>

</body>
</html>
