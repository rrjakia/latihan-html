<!DOCTYPE html>
<html>
<head>
  <title>Lesson 8 - Display Property</title>
  <link rel="stylesheet" href="lesson8.css">
</head>
<body>

  <h3>8a. Display Block</h3>
  <input class="display-block-input" type="text" placeholder="Name">
  <input class="display-block-input" type="text" placeholder="Email">

  <hr>

  <h3>8b. Inline-Block & Vertical Align</h3>
  <p class="survey-text">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
  <button class="survey-btn">Yes</button>
  <button class="survey-btn">No</button>

  <hr>

  <h3>8c. Google Design</h3>
  <img class="google-logo" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png">
  <input class="google-search" type="text" placeholder="Search Google or type a URL">

  <hr>

  <h3>8d. Sign Up Form</h3>
  <div class="signup-container">
    <input class="name-input" type="text" placeholder="First name">
    <input class="name-input" type="text" placeholder="Last name">
    <input class="full-width-input" type="text" placeholder="Email">
    <button class="signup-btn">Sign Up</button>
  </div>

  <hr>

  <h3>8e. Uber Form</h3>
  <div class="uber-container">
    <p class="uber-title">Request a ride now</p>
    <input class="uber-input" type="text" placeholder="Enter pickup location">
    <input class="uber-input" type="text" placeholder="Enter destination">
    <button class="uber-btn-black">Request now</button>
    <button class="uber-btn-gray">Schedule for later</button>
  </div>

</body>
</html>
